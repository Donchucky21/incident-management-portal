name: Deploy Incident Portal to ECS

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/ecs-deploy.yml"

env:
  AWS_REGION: eu-west-2
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

  BACKEND_ECR_REPOSITORY: incident-portal-backend
  FRONTEND_ECR_REPOSITORY: incident-portal-frontend

  ECS_CLUSTER: incident-portal-prod-cluster
  BACKEND_SERVICE: incident-portal-prod-backend-service
  FRONTEND_SERVICE: incident-portal-prod-frontend-service

  BACKEND_CONTAINER_NAME: backend
  FRONTEND_CONTAINER_NAME: frontend

jobs:
  deploy:
    name: Build, Push and Deploy to ECS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | docker login \
            --username AWS \
            --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Build and push backend image
        run: |
          BACKEND_IMAGE=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_ECR_REPOSITORY:${{ github.sha }}

          docker build -t $BACKEND_IMAGE ./backend
          docker push $BACKEND_IMAGE

          echo "BACKEND_IMAGE=$BACKEND_IMAGE" >> $GITHUB_ENV

      - name: Build and push frontend image
        run: |
          FRONTEND_IMAGE=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_ECR_REPOSITORY:${{ github.sha }}

          docker build -t $FRONTEND_IMAGE ./frontend
          docker push $FRONTEND_IMAGE

          echo "FRONTEND_IMAGE=$FRONTEND_IMAGE" >> $GITHUB_ENV

      - name: Get current backend task definition
        run: |
          BACKEND_TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $BACKEND_SERVICE \
            --query 'services[0].taskDefinition' \
            --output text)

          aws ecs describe-task-definition \
            --task-definition $BACKEND_TASK_DEF_ARN \
            --query 'taskDefinition' \
            > backend-task-definition.json

      - name: Create new backend task definition
        run: |
          jq --arg IMAGE "$BACKEND_IMAGE" \
             --arg CONTAINER "$BACKEND_CONTAINER_NAME" \
             '.containerDefinitions |= map(if .name == $CONTAINER then .image = $IMAGE else . end)
              | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
             backend-task-definition.json > backend-new-task-definition.json

          NEW_BACKEND_TASK_DEF=$(aws ecs register-task-definition \
            --cli-input-json file://backend-new-task-definition.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "NEW_BACKEND_TASK_DEF=$NEW_BACKEND_TASK_DEF" >> $GITHUB_ENV

      - name: Deploy backend to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $BACKEND_SERVICE \
            --task-definition $NEW_BACKEND_TASK_DEF

          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $BACKEND_SERVICE

      - name: Get current frontend task definition
        run: |
          FRONTEND_TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $FRONTEND_SERVICE \
            --query 'services[0].taskDefinition' \
            --output text)

          aws ecs describe-task-definition \
            --task-definition $FRONTEND_TASK_DEF_ARN \
            --query 'taskDefinition' \
            > frontend-task-definition.json

      - name: Create new frontend task definition
        run: |
          jq --arg IMAGE "$FRONTEND_IMAGE" \
             --arg CONTAINER "$FRONTEND_CONTAINER_NAME" \
             '.containerDefinitions |= map(if .name == $CONTAINER then .image = $IMAGE else . end)
              | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
             frontend-task-definition.json > frontend-new-task-definition.json

          NEW_FRONTEND_TASK_DEF=$(aws ecs register-task-definition \
            --cli-input-json file://frontend-new-task-definition.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "NEW_FRONTEND_TASK_DEF=$NEW_FRONTEND_TASK_DEF" >> $GITHUB_ENV

      - name: Deploy frontend to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $FRONTEND_SERVICE \
            --task-definition $NEW_FRONTEND_TASK_DEF

          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $FRONTEND_SERVICE

      - name: Validate live app
        run: |
          curl -I https://incident.starttechapp.uk
          curl -i https://incident.starttechapp.uk/api/health
          curl -i https://incident.starttechapp.uk/api/health/db