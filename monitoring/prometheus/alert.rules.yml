groups:
  - name: incident-portal-alerts
    rules:
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Backend service is down"
          description: "Prometheus cannot scrape the backend /metrics endpoint."

      - alert: HighHttpErrorRate
        expr: rate(incident_http_requests_total{status_code=~"5.."}[1m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP 5xx error rate"
          description: "The backend is returning 5xx errors."

      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, rate(incident_http_request_duration_seconds_bucket[5m])) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High request latency"
          description: "95th percentile request latency is above 1 second."
