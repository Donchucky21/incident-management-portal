services:
  postgres:
    image: postgres:16-alpine
    container_name: incident-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: incident_db
      POSTGRES_USER: incident_user
      POSTGRES_PASSWORD: incident_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incident_user -d incident_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - incident-network

  backend:
    build:
      context: ./backend
    container_name: incident-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: incident_db
      DB_USER: incident_user
      DB_PASSWORD: incident_password
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - incident-network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    container_name: incident-frontend
    restart: unless-stopped
    ports:
      - "5173:8080"
    depends_on:
      - backend
    networks:
      - incident-network

  prometheus:
    image: prom/prometheus:latest
    container_name: incident-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend
      - alertmanager
    networks:
      - incident-network

  grafana:
    image: grafana/grafana-oss:latest
    container_name: incident-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - incident-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: incident-cadvisor
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - incident-network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: incident-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - incident-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: incident-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - incident-network

  k6:
    image: grafana/k6:latest
    container_name: incident-k6
    volumes:
      - ./tests/k6:/scripts
    command: run /scripts/load-test.js
    depends_on:
      - backend
    networks:
      - incident-network
    profiles:
      - testing

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  incident-network:
    driver: bridge